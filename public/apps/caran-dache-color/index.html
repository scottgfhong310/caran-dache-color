<!doctype html>
<html lang="zh-Hant" data-theme="dark">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <title>Caran d’Ache Color → CSS</title>

  <!-- 防主題閃爍：render 前先讀 localStorage 設好 data-theme 與 dark-mode/light-mode class（§5.1 坑） -->
  <script>
    try {
      var t = localStorage.getItem('caran-dache-color-theme') || 'dark';
      var r = document.documentElement;
      r.dataset.theme = t;
      r.classList.toggle('dark-mode', t === 'dark');
      r.classList.toggle('light-mode', t === 'light');
    } catch (e) { }
  </script>

  <!-- Materialize 1.0.0 + Material Icons -->
  <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/materialize/1.0.0/css/materialize.min.css" />
  <!-- Materialize 元件深色（家族共用；在 materialize.css 之後、本頁樣式之前） -->
  <link rel="stylesheet" href="./materialize-dark.css" />

  <link rel="stylesheet" href="./caran-dache-color.css" />
  <link rel="stylesheet" href="./side-tool.css" />
  <link rel="stylesheet" href="./filter-clear.css" />   <!-- 共用 utility：搜尋框「清除」× 鈕 -->
</head>

<body data-i18n-doctitle="title.page">

  <main>
    <div class="app-container">

      <div class="topbar">
        <div class="topbar-head">
          <h1 data-i18n="app.title">Caran d’Ache 色號 → CSS</h1>
          <div class="sub" data-i18n="app.sub">色票取樣自官方色卡 PDF，為螢幕近似值</div>
        </div>
        <div class="search-wrap">
          <i class="material-icons">search</i>
          <input id="search" type="text" autocomplete="off" spellcheck="false"
                 data-i18n-placeholder="search.placeholder" placeholder="色號或色名…" data-filter-clear />
          <span id="count" class="count"></span>
        </div>
      </div>

      <!-- 模式切換（系列 / 正典）+ 系列 chips -->
      <div class="navbar">
        <div class="mode-toggle" role="tablist" aria-label="browse mode">
          <button id="mode-series" class="mode-btn" role="tab" data-mode="series" data-i18n="mode.series">系列</button>
          <button id="mode-canon" class="mode-btn" role="tab" data-mode="canonical" data-i18n="mode.canonical">正典色碼</button>
        </div>
        <div id="series-chips" class="series-chips" role="tablist" aria-label="series"></div>
      </div>

      <section id="grid" class="cda-list" aria-live="polite"></section>
      <div id="no-result" class="no-result" style="display:none" data-i18n="search.empty">找不到符合的顏色</div>

    </div>
  </main>

  <!-- ===== 右側工具列（flex 容器：正統版） ===== -->
  <div class="side-tools">
    <div id="setting-sort" class="side-tool" data-i18n-title="tool.sort" title="排序：色號 / 色相 / 明度 / 色系 / hex">
      <i class="material-icons">sort</i>
    </div>
    <div id="setting-css" class="side-tool" data-i18n-title="tool.css" title="檢視 / 複製整份 CSS">
      <i class="material-icons">code</i>
    </div>
    <div id="setting-download" class="side-tool" data-i18n-title="tool.download" title="下載 caran_dache_colors.css">
      <i class="material-icons">file_download</i>
    </div>
    <div id="setting-mode" class="side-tool" data-i18n-title="tool.mode" title="切換 light / dark">
      <i class="material-icons">dark_mode</i>
    </div>
    <div id="setting-lang" class="side-tool" data-i18n-title="tool.lang" title="Language">
      <i class="material-icons">translate</i>
    </div>
  </div>

  <!-- ===== 色票明細 Modal（點色票開啟；內容由 JS 填入、依 series/canonical 調整） ===== -->
  <div id="detail-modal" class="modal detail-modal">
    <div class="modal-content">
      <div id="detail-head" class="detail-head">
        <span class="d-code" id="detail-code"></span>
        <span class="d-tag" id="detail-tag"></span>
      </div>
      <div class="detail-body">
        <div class="d-name" id="detail-name"></div>
        <div class="d-name-loc" id="detail-name-loc"></div>
        <div class="d-note" id="detail-note"></div>

        <div class="copy-row" id="detail-copy"></div>

        <div class="d-section" id="detail-facts-sec">
          <table class="facts-table"><tbody id="detail-facts"></tbody></table>
        </div>

        <div class="d-section" id="detail-cross-sec">
          <h6 data-i18n="detail.crossSeries">同色碼跨系列</h6>
          <div id="detail-cross" class="cross-strip"></div>
          <div id="detail-cross-note" class="cross-note"></div>
        </div>
      </div>
    </div>
    <div class="modal-footer">
      <a href="#!" class="modal-close waves-effect btn-flat" data-i18n="detail.close">關閉</a>
    </div>
  </div>

  <!-- ===== CSS 匯出 Modal ===== -->
  <div id="css-modal" class="modal css-modal">
    <div class="modal-content">
      <h5 data-i18n="css.title">CSS 變數 + utility classes</h5>
      <div class="css-sub" data-i18n-html="css.sub">764 個 <code>--cda-&lt;series&gt;-&lt;code&gt;</code> 變數與對應 utility class</div>
      <pre id="css-pre"></pre>
    </div>
    <div class="modal-footer">
      <a href="#!" id="css-copy" class="waves-effect btn-flat"><i class="material-icons left">content_copy</i><span data-i18n="css.copy">複製全部</span></a>
      <a href="#!" id="css-download" class="waves-effect btn-flat"><i class="material-icons left">file_download</i><span data-i18n="css.download">下載 .css</span></a>
      <a href="#!" class="modal-close waves-effect btn-flat" data-i18n="detail.close">關閉</a>
    </div>
  </div>

  <!-- 依賴：jQuery / Materialize / CaranDacheColorLib + 資料 -->
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/materialize/1.0.0/js/materialize.min.js"></script>
  <script src="./caran-dache-color-lib.js"></script>
  <script src="./data/cda-series.js"></script>
  <script src="./data/cda-colors.js"></script>
  <script src="./data/cda-canonical.js"></script>

  <!-- i18n 引擎 + 語言字典（先引擎再各語系；新增語言＝多一個 locale 檔） -->
  <script src="./i18n.js"></script>
  <script src="./locales/zh-Hant.js"></script>
  <script src="./locales/en.js"></script>
  <script src="./locales/ja.js"></script>

  <script src="./filter-clear.js"></script>   <!-- 共用 utility：搜尋框清除鈕 -->
  <script src="./caran-dache-color.js"></script>
</body>

</html>
